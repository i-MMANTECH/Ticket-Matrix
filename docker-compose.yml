# Emmanuel Aro's project submission for evaluation.
#
# One-command local stack: spins up the Django REST API and the Next.js
# frontend. Database lives on Supabase (Postgres) — connection details
# are read from backend/.env.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket-matrix-backend
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=ticket_matrix.settings
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-matrix-frontend
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev
    restart: unless-stopped